    <div class="page-header">
        <h1>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 12v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8"/>
                <path d="M12 2v12m-3-3 3 3 3-3"/>
                <path d="M4 8h16"/>
            </svg>
            وسایل گمشده
        </h1>
        <p>لیست تمام وسایلی که در محوطه دانشگاه گم شده یا پیدا شده است</p>
    </div>

    <div class="filter-section">
        <div class="filter-box">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">همه</button>
                <button class="filter-btn" data-filter="searching">در جستجو</button>
                <button class="filter-btn" data-filter="found">پیدا شده</button>
            </div>
        </div>
    </div>

    <div class="lost-list" id="lostList"></div>

    <div class="footer">
        <p>© ۱۴۰۵ تمامی حقوق برای دانشگاه ملی مهارت دختران قم محفوظ است</p>
    </div>
    <div class="floating-support" id="supportBtn">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
</div>

<div class="chatbot-container" id="chatbotContainer">
    <div class="chatbot-header">
        <span>پشتیبانی</span>
        <button class="close-chat" id="closeChat" style="background:none;border:none;color:white;font-size:24px;cursor:pointer;">×</button>
    </div>
    <div class="chatbot-messages" id="chatMessages">
        <div class="message bot-message">سلام! چطور میتونم کمک کنم؟</div>
    </div>
    <div class="quick-replies">
        <button class="quick-reply-btn" data-msg="رزرو سالن">رزرو سالن</button>
        <button class="quick-reply-btn" data-msg="ساعات کاری">ساعات کاری</button>
        <button class="quick-reply-btn" data-msg="قوانین">قوانین</button>
        <button class="quick-reply-btn" data-msg="تماس">شماره تماس</button>
    </div>
    <div class="chatbot-input-area">
        <input type="text" class="chatbot-input" id="chatInput" placeholder="پیام...">
        <button class="chatbot-send" id="sendMessage">➤</button>
    </div>
</div>
    <div class="go-up-btn" id="goUpBtn">↑</div>

    <div class="claim-modal" id="claimModal">
        <div class="claim-modal-content">
            <h3 id="modalTitle">ادعای مالکیت وسیله</h3>
            <div class="form-group">
                <label>نام و نام خانوادگی</label>
                <input type="text" id="claimantName" placeholder="نام و نام خانوادگی خود را وارد کنید">
            </div>
            <div class="form-group">
                <label>شماره تماس</label>
                <input type="tel" id="claimantPhone" placeholder="۰۹XXXXXXXXX">
            </div>
            <div class="form-group">
                <label>توضیحات تکمیلی و مشخصات وسیله</label>
                <textarea id="claimantDesc" placeholder="رنگ، برند، ویژگی‌های خاص و هر چیزی که به اثبات مالکیت کمک می‌کند..."></textarea>
            </div>
            <button class="submit-claim" onclick="submitClaim()">ارسال درخواست به ادمین</button>
            <button class="close-modal" onclick="closeClaimModal()">انصراف</button>
        </div>
    </div>
    <script src="js/background.js"></script>
    <script src="js/all-losts.js"></script>
    <script src="js/main-menu.js"></script>
</body>
</html>
