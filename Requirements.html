<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>نیازمندی‌های دانشگاه</title>
    <link href="css/main-menu.css" rel="stylesheet">
    <link href="css/requeriment.css" rel="stylesheet">
    <link href="css/background.css" rel="stylesheet">  
</head>
<body>
     <nav class="menu">
        <div class="menu-container">
            <div class="menu-left">
                <img src="img/logo.jpg" class="logo" alt="لوگو">
                <button class="hamburger-btn" id="hamburgerBtn">
                    <span class="line"></span>
                    <span class="line"></span>
                    <span class="line"></span>
                </button>
            </div>
            <ul id="navMenu">
                <li><a href="index.html" class="menu-item"><span class="menu-icon icon-home"></span> خانه</a></li>
                <li><a href="login.html" class="menu-item"><span class="menu-icon icon-login"></span> ورود</a></li>
                <li><a href="hallReservation.html" class="menu-item"><span class="menu-icon icon-booking"></span> رزرو سالن</a></li>
                <li><a href="class_time.html" class="menu-item"><span class="menu-icon icon-schedule"></span> ساعات کلاس ها</a></li>
                <li><a href="notice.html" class="menu-item"><span class="menu-icon icon-uni"></span> اطلاعیه های دانشگاه</a></li>
                <li><a href="rules.html" class="menu-item"><span class="menu-icon icon-rules"></span> قوانین</a></li>
                <li><a href="ContactUs.html" class="menu-item"><span class="menu-icon icon-contact"></span> تماس با ما</a></li>
            </ul>
        </div>
    </nav>

    <div class="floating-support" id="supportBtn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </div>
    <div class="chatbot-container" id="chatbotContainer">
        <div class="chatbot-header"><span>پشتیبانی</span><button class="close-chat" id="closeChat" style="background:none;border:none;color:white;font-size:24px;cursor:pointer;">×</button></div>
        <div class="chatbot-messages" id="chatMessages"><div class="message bot-message">سلام! چطور میتونم کمک کنم؟</div></div>
        <div class="quick-replies">
            <button class="quick-reply-btn" data-msg="رزرو سالن">رزرو سالن</button>
            <button class="quick-reply-btn" data-msg="ساعات کاری">ساعات کاری</button>
            <button class="quick-reply-btn" data-msg="قوانین">قوانین</button>
            <button class="quick-reply-btn" data-msg="تماس">شماره تماس</button>
        </div>
        <div class="chatbot-input-area">
            <input type="text" class="chatbot-input" id="chatInput" placeholder="پیام...">
            <button class="chatbot-send" id="sendMessage">➤</button>
        </div>
    </div>

    <div class="needs-wrapper">
        <div class="page-header">
            <h1>
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 3L1 9l11 6 11-6-11-6z"/>
                    <path d="M3 9l9 5 9-5"/>
                    <path d="M3 13l9 5 9-5"/>
                    <path d="M3 17l9 5 9-5"/>
                </svg>
                نیازمندی‌های دانشگاه
            </h1>
            <p>با مشارکت شما، امکانات ورزشی دانشگاه را بهتر می‌کنیم</p>
        </div>
        <div class="filters-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="جستجوی نیازمندی...">
                <svg class="search-icon-pos" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </div>
            <div class="status-filter">
                <button class="filter-btn active" data-filter="all">همه</button>
                <button class="filter-btn" data-filter="active">در حال جمع‌آوری</button>
                <button class="filter-btn" data-filter="completed">تکمیل شده</button>
            </div>
        </div>
        <div id="needsGrid" class="needs-grid"></div>
    </div>
    <div id="donationModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#ffd966" stroke-width="1.5">
                <path d="M12 3L1 9l11 6 11-6-11-6z"/>
                <path d="M3 9l9 5 9-5"/>
            </svg>
            <h3>اهدای مبلغ</h3>
            <p id="donationItemTitle" style="margin: 8px 0; font-weight: bold; font-size: 13px;"></p>
            <input type="number" id="donationAmount" class="tracking-input" placeholder="مبلغ به تومان (حداقل 10,000 تومان)">
            <div id="amountInWords" style="font-size: 12px; margin-top: 5px; margin-bottom: 15px;"></div>
            <input type="text" id="donorName" class="tracking-input" placeholder="نام شما (اختیاری)">
            <button id="confirmDonationBtn" class="tracking-btn">تایید و پرداخت</button>
            <button class="cancel-btn" onclick="closeDonationModal()">انصراف</button>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>

    <script src="js/background.js"></script>
    <script src="js/main-menu.js"></script>
    <script src="js/requeriment.js"></script>
</body>
</html>
