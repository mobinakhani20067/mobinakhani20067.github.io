<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ثبت رزرو </title>
    <link href="css/regest-reserve.css" rel="stylesheet">
</head>
<body>  
    <article class="content" id="login" style="text-align: center;">
        <div class="header">
            <img alt="header" src="img/header.jpg">
        </div>
        <nav class="buttons">
            <ul>
                <li class="td"><input class="button active" type="button" value="رزرو روزانه" title="رزرو روزانه" onclick="clickingOnLogin()"></li>
                <li class="td"><input class="button" type="button" value="رزرو طولانی" title="رزرو طولانی" onclick="clickingOnReset()"></li>
            </ul>
        </nav>
       
        <table class="items" border="0" align="center">
            <tr>
                <td><div><label>انتخاب تاریخ</label></div></td>
            </tr>
            <tr>
                <td>
                    <div class="date-picker-wrapper">
                        <input class="txt_login" type="text" id="dailyDate" placeholder="انتخاب تاریخ" readonly>
                        <button type="button" class="calendar-icon-btn" id="dailyCalendarBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="dailyCalendarPicker" class="calendar-picker" style="display: none;">
                        <div class="calendar-header">
                            <button type="button" class="pickerNextBtn">‹</button>
                            <span class="pickerMonthYear"></span>
                            <button type="button" class="pickerPrevBtn">›</button>
                        </div>
                        <div class="calendar-weekdays">
                            <span>ش</span><span>ی</span><span>د</span><span>س</span><span>چ</span><span>پ</span><span>ج</span>
                        </div>
                        <div class="calendar-days"></div>
                    </div>
                 </td>
             </tr>
             <tr>
                 <td><div><label>شماره کمد</label></div></td>
             </tr>
             <tr>
                 <td><input class="txt_login" type="text" id="dailyLockerNum" readonly></td>
             </tr>
         </table>
        <button class="btn_submit" type="submit" onclick="submitDailyReserve()">ثبت</button>
    </article>
    <article class="content" id="reset" style="display:none; text-align: center;">
        <div class="header">
            <img src="img/header.jpg" alt="header">
        </div>
        <nav class="buttons">
            <ul>
                <li class="td"><input class="button" type="button" value="رزرو روزانه" title="رزرو روزانه" onclick="clickingOnLogin()"></li>
                <li class="td"><input class="button active" type="button" value="رزرو طولانی" title="رزرو طولانی" onclick="clickingOnReset()"></li>
            </ul>
        </nav>
        <table class="items" border="0" align="center">
             <tr>
                 <td><div><label>انتخاب تاریخ شروع</label></div></td>
             </tr>
             <tr>
                 <td>
                    <div class="date-picker-wrapper">
                        <input class="txt_login" type="text" id="startDate" placeholder="انتخاب تاریخ شروع" readonly>
                        <button type="button" class="calendar-icon-btn" id="startCalendarBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="startCalendarPicker" class="calendar-picker" style="display: none;">
                        <div class="calendar-header">
                            <button type="button" class="pickerNextBtn">‹</button>
                            <span class="pickerMonthYear"></span>
                            <button type="button" class="pickerPrevBtn">›</button>
                        </div>
                        <div class="calendar-weekdays">
                            <span>ش</span><span>ی</span><span>د</span><span>س</span><span>چ</span><span>پ</span><span>ج</span>
                        </div>
                        <div class="calendar-days"></div>
                    </div>
                 </td>
             </tr>
             <tr>
                 <td><div><label>تعداد روز برای رزرو</label></div></td>
             </tr>
             <tr>
                 <td><input class="txt_login" type="number" min="2" max="100" id="durationDays" placeholder="2 تا 100 روز"></td>
             </tr>
             <tr>
                 <td><div><label>مبلغ قابل پرداخت</label></div></td>
             </tr>
             <tr>
                 <td><input class="txt_login" type="text" id="totalAmount" readonly style="background:#f0f6f0; font-weight:bold; color:#2c6e3c;"></td>
             </tr>
             <tr>
                 <td><div><label>شماره کمد</label></div></td>
             </tr>
             <tr>
                 <td><input class="txt_login" type="text" id="longLockerNum" readonly></td>
             </tr>
         </table>
        <button class="btn_submit" type="submit" onclick="submitLongReserve()">پرداخت و ثبت</button>
    </article>

    <script src="js/regest-reserve.js"></script>
</body>
</html>
