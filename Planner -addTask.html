<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>افزودن کار جدید</title>
	<link href="css/menu - planner.css" rel="stylesheet">
	<link href="css/planner_add_task.css" rel="stylesheet">
</head>
<body>
    <div class="page">
       <nav class="menu">
            <ul class="menu-items">
                <h2>برنامه‌ریزی</h2>
                <li><a href="profile.html"><span class="icon icon-profile"></span><span class="item">پروفایل</span></a></li>
                <li class="active"><a href="Planner -addTask.html"><span class="icon icon-addTask"></span><span class="item">افزودن کار</span></a></li>
                <li><a href="Planner -todayTask.html"><span class="icon icon-todayTask"></span><span class="item">کار های امروز</span></a></li>
                <li><a href="Planner - WeeklyPlan.html"><span class="icon icon-weekly"></span><span class="item">کار های این هفته</span></a></li>
                <li><a href="Planner_clander.html"><span class="icon icon-clander"></span><span class="item">تقویم</span></a></li>
            </ul>
        </nav>
        <div class="main">
            <h1><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23165526'%3E%3Cpath d='M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z'/%3E%3C/svg%3E" class="icon"> افزودن کار جدید</h1>
            
            <form class="form" id="taskForm">
                <table class="form-table">
                    <tr>
                        <td>
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232c7a47'%3E%3Cpath d='M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z'/%3E%3C/svg%3E" alt="" class="icon-label">
                            <label>نام کار:</label>
                        </td>
                        <td colspan="2">
                            <input type="text" id="taskName" placeholder="عنوان کار را وارد کنید..." required>
                        </td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232c7a47'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E" alt="" class="icon-label">
                            <label>مهم:</label>
                        </td>
                        <td colspan="2">
                            <input type="checkbox" id="importantCheckbox">
                        </td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232c7a47'%3E%3Cpath d='M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V5h14v14z'/%3E%3C/svg%3E" alt="" class="icon-label">
                            <label>انتخاب روز:</label>
                        </td>
                        <td colspan="2">
                            <select id="taskDay">
                                <option value="">انتخاب کنید</option>
                                <option value="شنبه">شنبه</option>
                                <option value="یکشنبه">یکشنبه</option>
                                <option value="دوشنبه">دوشنبه</option>
                                <option value="سه شنبه">سه شنبه</option>
                                <option value="چهارشنبه">چهارشنبه</option>
                                <option value="پنجشنبه">پنجشنبه</option>
                                <option value="جمعه">جمعه</option>
                            </select>
                        </td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232c7a47'%3E%3Cpath d='M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13h-1v6l5.25 3.15.75-1.23-4.5-2.67z'/%3E%3C/svg%3E" alt="" class="icon-label">
                            <label>زمان:</label>
                        </td>
                        <td colspan="2">
                            <input type="time" id="taskTime">
                        </td>
                        <td></td>
                    </tr>
                    <tr>
                        <td colspan="4">
                            <button type="submit">✔ ثبت برنامه</button>
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>

    <div class="bottom-nav-mobile">
        <a href="profile.html">
            <div class="nav-icon icon-profile-mobile"></div>
            <span class="nav-text">پروفایل</span>
        </a>
        <a href="Planner -addTask.html" class="active-mobile">
            <div class="nav-icon icon-addTask-mobile"></div>
            <span class="nav-text">افزودن</span>
        </a>
        <a href="Planner -todayTask.html">
            <div class="nav-icon icon-todayTask-mobile"></div>
            <span class="nav-text">امروز</span>
        </a>
        <a href="Planner - WeeklyPlan.html">
            <div class="nav-icon icon-weekly-mobile"></div>
            <span class="nav-text">هفته</span>
        </a>
        <a href="Planner_clander.html" >
            <div class="nav-icon icon-clander-mobile"></div>
            <span class="nav-text">تقویم</span>
        </a>
    </div>

    <script src="js/planner-add-task.js">
    </script>
</body>
</html>
